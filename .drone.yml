      API_URL: http://hostai-api-svc.hostai-pr-${DRONE_PULL_REQUEST}.svc.cluster.local:8000
      BASE_URL: http://hostai-api-svc.hostai-pr-${DRONE_PULL_REQUEST}.svc.cluster.local:8000
    commands:
      - cd /e2e && npx playwright test tests/ui/dashboard.spec.ts --project=chromium --reporter=list,html; TEST_RC=$?; cp -r /e2e/test-results /e2e/playwright-report /drone/src/ 2>/dev/null; exit $TEST_RC
  - name: upload-report
    image: google/cloud-sdk:slim
    environment:
      GCR_JSON_KEY:
        from_secret: gcr_json_key
    commands:
      - printf '%s' "$GCR_JSON_KEY" > /tmp/gcs-key.json
      - gcloud auth activate-service-account --key-file=/tmp/gcs-key.json
      - gsutil -m cp -r /drone/src/playwright-report gs://hostai-test-reports/pr-$DRONE_PULL_REQUEST/build-$DRONE_BUILD_NUMBER/ui-dashboard/ 2>/dev/null || true
      - gsutil -m cp -r /drone/src/test-results gs://hostai-test-reports/pr-$DRONE_PULL_REQUEST/build-$DRONE_BUILD_NUMBER/ui-dashboard/ 2>/dev/null || true
      - echo "Report at https://storage.googleapis.com/hostai-test-reports/pr-$DRONE_PULL_REQUEST/build-$DRONE_BUILD_NUMBER/ui-dashboard/playwright-report/index.html"
    when:
      status: [success, failure]

