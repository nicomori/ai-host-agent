# =============================================================================
# HostAI — Drone CI/CD Configuration
# =============================================================================
# GKE Standard cluster: drone-ci-standard (europe-west3-a)
# K8s Runner (cap 8): builds con DinD service + tests paralelos + deploy
#
# PR flow:  build-images → deploy-preview → 11 tests paralelos → cleanup
# Main flow: build-production → deploy-production
#
# Base images (pre-baked deps, rebuild when deps change):
#   hostai-api-base:latest  — Python + apt + UI node_modules
#   hostai-e2e-base:latest  — Playwright + Chromium + npm deps
# =============================================================================

# ══════════════════════════════════════════════════════════════════════════════
# PIPELINE: BUILD IMAGES (Docker Runner + persistent DinD with PVC cache)
# Uses type:docker to leverage the drone-docker-runner's persistent DinD daemon
# with PVC docker-cache (10Gi) → layers cached between builds → builds <30s
# ══════════════════════════════════════════════════════════════════════════════
kind: pipeline
type: docker
name: build-images

trigger:
  event: [pull_request]

steps:
  - name: build-app-image
    image: docker:27-cli
    environment:
      DOCKER_BUILDKIT: "1"
      GCR_JSON_KEY:
        from_secret: gcr_json_key
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    commands:
      - printf '%s' "$GCR_JSON_KEY" > /tmp/gcr-key.json
      - docker login -u _json_key --password-stdin europe-west3-docker.pkg.dev < /tmp/gcr-key.json
      - export REGISTRY=europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai
      - docker build
          --cache-from $REGISTRY/hostai-api:latest
          -t $REGISTRY/hostai-api:$DRONE_COMMIT_SHA
          -t $REGISTRY/hostai-api:latest
          .
      - docker push $REGISTRY/hostai-api:$DRONE_COMMIT_SHA
      - docker push $REGISTRY/hostai-api:latest

  - name: build-e2e-image
    image: docker:27-cli
    environment:
      DOCKER_BUILDKIT: "1"
      GCR_JSON_KEY:
        from_secret: gcr_json_key
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    commands:
      - printf '%s' "$GCR_JSON_KEY" > /tmp/gcr-key.json
      - docker login -u _json_key --password-stdin europe-west3-docker.pkg.dev < /tmp/gcr-key.json
      - export REGISTRY=europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai
      - docker build
          --cache-from $REGISTRY/hostai-e2e:latest
          -t $REGISTRY/hostai-e2e:$DRONE_COMMIT_SHA
          -t $REGISTRY/hostai-e2e:latest
          e2e/
      - docker push $REGISTRY/hostai-e2e:$DRONE_COMMIT_SHA
      - docker push $REGISTRY/hostai-e2e:latest
    depends_on: [build-app-image]

volumes:
  - name: docker-socket
    host:
      path: /var/run/docker.sock

# ══════════════════════════════════════════════════════════════════════════════
# PIPELINE: DEPLOY PREVIEW (K8s Runner, type: kubernetes)
# ══════════════════════════════════════════════════════════════════════════════
---
kind: pipeline
type: kubernetes
name: deploy-preview

trigger:
  event: [pull_request]

depends_on: [build-images]

steps:
  - name: deploy
    image: bitnami/kubectl:latest
    commands:
      - export NS="hostai-pr-$DRONE_PULL_REQUEST"
      - |
        if kubectl get namespace $NS 2>/dev/null; then
          echo "Namespace $NS exists, deleting and waiting..."
          kubectl delete namespace $NS --ignore-not-found=true
          for i in $(seq 1 30); do
            kubectl get namespace $NS 2>/dev/null || break
            echo "Waiting for namespace deletion... ($i/30)"
            sleep 3
          done
        fi
      - sed -e "s|\$${PR_NUMBER}|$DRONE_PULL_REQUEST|g"
            -e "s|\$${COMMIT_SHA}|$DRONE_COMMIT_SHA|g"
            ci/k8s/preview.yaml | kubectl apply -f -
      - kubectl get secret ar-pull-secret -n drone -o yaml
          | grep -v '^\s*namespace:'
          | grep -v '^\s*resourceVersion:'
          | grep -v '^\s*uid:'
          | grep -v '^\s*creationTimestamp:'
          | kubectl apply -n $NS -f -
      - kubectl rollout status deployment/hostai-api -n $NS --timeout=300s

  - name: wait-for-health
    image: curlimages/curl:8.5.0
    commands:
      - export URL="http://hostai-api-svc.hostai-pr-$DRONE_PULL_REQUEST.svc.cluster.local:8000/health"
      - echo "Waiting for $URL ..."
      - for i in $(seq 1 30); do
          curl -sf "$URL" > /dev/null 2>&1 && echo "Health OK!" && exit 0;
          echo "Attempt $i/30 - waiting 5s...";
          sleep 5;
        done
      - echo "Health check FAILED after 150s"
      - exit 1
    depends_on: [deploy]

# ══════════════════════════════════════════════════════════════════════════════
# PIPELINES: 11 TESTS E2E EN PARALELO (K8s Runner, 1 pod cada uno)
# ══════════════════════════════════════════════════════════════════════════════

---
kind: pipeline
type: kubernetes
name: test-api-health
trigger: { event: [pull_request] }
depends_on: [deploy-preview]
image_pull_secrets: [ar-pull-secret]
steps:
  - name: run
    image: europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-e2e:${DRONE_COMMIT_SHA}
    environment:
      CI: "true"
      API_URL: http://hostai-api-svc.hostai-pr-${DRONE_PULL_REQUEST}.svc.cluster.local:8000
      BASE_URL: http://hostai-api-svc.hostai-pr-${DRONE_PULL_REQUEST}.svc.cluster.local:8000
    commands:
      - npx playwright test tests/api/health.spec.ts --project=chromium --reporter=list

