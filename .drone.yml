# ══════════════════════════════════════════════════════════════════════════════
# PIPELINE: REPORT + CLEANUP (siempre corre al final)
# ══════════════════════════════════════════════════════════════════════════════
---
kind: pipeline
type: kubernetes
name: report-and-cleanup

trigger:
  event: [pull_request]

depends_on:
  - test-api-health
  - test-api-auth
  - test-api-reservations
  - test-api-floor-plan
  - test-api-config
  - test-api-security
  - test-api-agent
  - test-ui-dashboard
  - test-ui-chat
  - test-ui-floor-plan
  - test-ui-rbac

steps:
  - name: report-datadog
    image: curlimages/curl:8.5.0
    environment:
      DD_API_KEY:
        from_secret: dd_api_key
    commands:
      - export TS=$(date +%s)
      - 'curl -s -X POST "https://api.datadoghq.eu/api/v1/events"
          -H "DD-API-KEY: $DD_API_KEY"
          -H "Content-Type: application/json"
          -d "{\"title\":\"HOST-AI PR #$DRONE_PULL_REQUEST tests completed\",
               \"text\":\"Branch: $DRONE_BRANCH. Commit: $DRONE_COMMIT_SHA. Status: $DRONE_BUILD_STATUS\",
               \"priority\":\"normal\",
               \"tags\":[\"pipeline:ai-host-agent\",\"pr:$DRONE_PULL_REQUEST\",
                         \"branch:$DRONE_BRANCH\",\"env:ci\",\"source:drone-ci\"],
               \"alert_type\":\"info\",
               \"source_type_name\":\"DRONE\"}"'
      - echo "Event sent to Datadog"

  - name: cleanup-preview
    image: bitnami/kubectl:latest
    commands:
      - export NS="hostai-pr-$DRONE_PULL_REQUEST"
      - echo "Cleaning up namespace $NS..."
      - kubectl delete namespace $NS --ignore-not-found=true
      - echo "Cleanup complete"
    depends_on: [report-datadog]

# ══════════════════════════════════════════════════════════════════════════════
# PIPELINE: BUILD PRODUCTION (Docker Runner + persistent DinD with PVC cache)
# ══════════════════════════════════════════════════════════════════════════════
---
kind: pipeline
type: docker
name: build-production

trigger:
  branch: [main]
  event: [push]

steps:
  - name: build-and-push
    image: docker:27-cli
    environment:
      DOCKER_BUILDKIT: "1"
      GCR_JSON_KEY:
        from_secret: gcr_json_key
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
    commands:
      - printf '%s' "$GCR_JSON_KEY" > /tmp/gcr-key.json
      - docker login -u _json_key --password-stdin europe-west3-docker.pkg.dev < /tmp/gcr-key.json
      - export REGISTRY=europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai
      - docker build
          --cache-from $REGISTRY/hostai-api:latest
          -t $REGISTRY/hostai-api:$DRONE_COMMIT_SHA
          -t $REGISTRY/hostai-api:latest
          .
      - docker push $REGISTRY/hostai-api:$DRONE_COMMIT_SHA
      - docker push $REGISTRY/hostai-api:latest

volumes:
  - name: docker-socket
    host:
      path: /var/run/docker.sock

# ══════════════════════════════════════════════════════════════════════════════
# PIPELINE: DEPLOY PRODUCTION (push a main, K8s Runner)
# ══════════════════════════════════════════════════════════════════════════════
---
kind: pipeline
type: kubernetes
name: deploy-production

trigger:
  branch: [main]
  event: [push]

depends_on: [build-production]

steps:
  - name: deploy
    image: bitnami/kubectl:latest
    commands:
      - echo "Deploying to production..."
      - kubectl set image deployment/hostai-api
          api=europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api:$DRONE_COMMIT_SHA
          -n hostai-prod
      - kubectl rollout status deployment/hostai-api -n hostai-prod --timeout=120s
      - echo "Production deploy complete"

  - name: report-datadog
    image: curlimages/curl:8.5.0
    environment:
      DD_API_KEY:
        from_secret: dd_api_key
    commands:
      - 'curl -s -X POST "https://api.datadoghq.eu/api/v1/events"
          -H "DD-API-KEY: $DD_API_KEY"
          -H "Content-Type: application/json"
          -d "{\"title\":\"HOST-AI production deployed\",
               \"text\":\"Commit: $DRONE_COMMIT_SHA. Branch: main.\",
               \"tags\":[\"pipeline:ai-host-agent\",\"env:production\",\"source:drone-ci\"],
               \"alert_type\":\"success\"}"'
    depends_on: [deploy]
