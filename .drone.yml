# ══════════════════════════════════════════════════════════════════════════════
# PIPELINE: REPORT + CLEANUP (siempre corre al final)
# ══════════════════════════════════════════════════════════════════════════════
---
kind: pipeline
type: kubernetes
name: report-and-cleanup

trigger:
  event: [pull_request]

depends_on:
  - test-api-health
  - test-api-auth
  - test-api-reservations
  - test-api-floor-plan
  - test-api-config
  - test-api-security
  - test-api-agent
  - test-ui-dashboard
  - test-ui-chat
  - test-ui-floor-plan
  - test-ui-rbac

steps:
  - name: report-datadog
    image: curlimages/curl:8.5.0
    environment:
      DD_API_KEY:
        from_secret: dd_api_key
    commands:
      - export TS=$(date +%s)
      - 'curl -s -X POST "https://api.datadoghq.eu/api/v1/events"
          -H "DD-API-KEY: $DD_API_KEY"
          -H "Content-Type: application/json"
          -d "{\"title\":\"HOST-AI PR #$DRONE_PULL_REQUEST tests completed\",
               \"text\":\"Branch: $DRONE_BRANCH. Commit: $DRONE_COMMIT_SHA. Status: $DRONE_BUILD_STATUS\",
               \"priority\":\"normal\",
               \"tags\":[\"pipeline:ai-host-agent\",\"pr:$DRONE_PULL_REQUEST\",
                         \"branch:$DRONE_BRANCH\",\"env:ci\",\"source:drone-ci\"],
               \"alert_type\":\"info\",
               \"source_type_name\":\"DRONE\"}"'
      - echo "Event sent to Datadog"

  - name: cleanup-preview
    image: bitnami/kubectl:latest
    commands:
      - export NS="hostai-pr-$DRONE_PULL_REQUEST"
      - echo "Cleaning up namespace $NS..."
      - kubectl delete namespace $NS --ignore-not-found=true
      - echo "Cleanup complete"
    depends_on: [report-datadog]

# ══════════════════════════════════════════════════════════════════════════════
# PIPELINE: BUILD PRODUCTION (push a main, K8s Runner + DinD + cache)
# ══════════════════════════════════════════════════════════════════════════════
---
kind: pipeline
type: kubernetes
name: build-production

trigger:
  branch: [main]
  event: [push]

volumes:
  - name: docker-cache
    claim:
      name: docker-cache
      read_only: false

services:
  - name: dind
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - name: docker-cache
        path: /var/lib/docker

steps:
  - name: build-and-push
    image: docker:27-cli
    environment:
      DOCKER_HOST: tcp://localhost:2375
      DOCKER_BUILDKIT: "1"
      GCR_JSON_KEY:
        from_secret: gcr_json_key
    commands:
      - until docker info >/dev/null 2>&1; do sleep 1; done
      - printf '%s' "$GCR_JSON_KEY" > /tmp/gcr-key.json
      - docker login -u _json_key --password-stdin europe-west3-docker.pkg.dev < /tmp/gcr-key.json
      - docker pull europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api:latest 2>/dev/null || true
      - docker build
          --cache-from=europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api:latest
          --build-arg BUILDKIT_INLINE_CACHE=1
          -t europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api:$DRONE_COMMIT_SHA
          -t europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api:latest
          .
      - docker push europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api:$DRONE_COMMIT_SHA
      - docker push europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api:latest

# ══════════════════════════════════════════════════════════════════════════════
# PIPELINE: DEPLOY PRODUCTION (push a main, K8s Runner)
# ══════════════════════════════════════════════════════════════════════════════
---
kind: pipeline
type: kubernetes
name: deploy-production

trigger:
  branch: [main]
  event: [push]

depends_on: [build-production]

steps:
  - name: deploy
    image: bitnami/kubectl:latest
    commands:
      - echo "Deploying to production..."
      - kubectl set image deployment/hostai-api
          api=europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api:$DRONE_COMMIT_SHA
          -n hostai-prod
      - kubectl rollout status deployment/hostai-api -n hostai-prod --timeout=120s
      - echo "Production deploy complete"

  - name: report-datadog
    image: curlimages/curl:8.5.0
    environment:
      DD_API_KEY:
        from_secret: dd_api_key
    commands:
      - 'curl -s -X POST "https://api.datadoghq.eu/api/v1/events"
          -H "DD-API-KEY: $DD_API_KEY"
          -H "Content-Type: application/json"
          -d "{\"title\":\"HOST-AI production deployed\",
               \"text\":\"Commit: $DRONE_COMMIT_SHA. Branch: main.\",
               \"tags\":[\"pipeline:ai-host-agent\",\"env:production\",\"source:drone-ci\"],
               \"alert_type\":\"success\"}"'
    depends_on: [deploy]
