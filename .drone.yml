# =============================================================================
# HostAI — Drone CI/CD Configuration
# =============================================================================
# GKE Standard cluster: drone-ci-standard (europe-west3-a)
# K8s Runner (cap 8): builds con DinD service + tests paralelos + deploy
#
# PR flow:  build-images → deploy-preview → 11 tests paralelos → cleanup
# Main flow: build-production → deploy-production
#
# Base images (pre-baked deps, rebuild when deps change):
#   hostai-api-base:latest  — Python + apt + UI node_modules
#   hostai-e2e-base:latest  — Playwright + Chromium + npm deps
# =============================================================================

# ══════════════════════════════════════════════════════════════════════════════
# PIPELINE: BUILD IMAGES (K8s Runner + DinD sidecar + persistent cache)
# ══════════════════════════════════════════════════════════════════════════════
kind: pipeline
type: kubernetes
name: build-images

trigger:
  event: [pull_request]

volumes:
  - name: docker-cache
    claim:
      name: docker-cache
      read_only: false

services:
  - name: dind
    image: docker:27-dind
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - name: docker-cache
        path: /var/lib/docker

steps:
  - name: build-app-image
    image: docker:27-cli
    environment:
      DOCKER_HOST: tcp://localhost:2375
      DOCKER_BUILDKIT: "1"
      GCR_JSON_KEY:
        from_secret: gcr_json_key
    commands:
      - until docker info >/dev/null 2>&1; do sleep 1; done
      - printf '%s' "$GCR_JSON_KEY" > /tmp/gcr-key.json
      - docker login -u _json_key --password-stdin europe-west3-docker.pkg.dev < /tmp/gcr-key.json
      - docker pull europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api:latest 2>/dev/null || true
      - docker build
          --cache-from=europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api:latest
          --build-arg BUILDKIT_INLINE_CACHE=1
          -t europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api:$DRONE_COMMIT_SHA
          -t europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api:latest
          .
      - docker push europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api:$DRONE_COMMIT_SHA
      - docker push europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api:latest

  - name: build-e2e-image
    image: docker:27-cli
    environment:
      DOCKER_HOST: tcp://localhost:2375
      DOCKER_BUILDKIT: "1"
      GCR_JSON_KEY:
        from_secret: gcr_json_key
    commands:
      - printf '%s' "$GCR_JSON_KEY" > /tmp/gcr-key.json
      - docker login -u _json_key --password-stdin europe-west3-docker.pkg.dev < /tmp/gcr-key.json
      - docker pull europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-e2e:latest 2>/dev/null || true
      - docker build
          --cache-from=europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-e2e:latest
          --build-arg BUILDKIT_INLINE_CACHE=1
          -t europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-e2e:$DRONE_COMMIT_SHA
          -t europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-e2e:latest
          e2e/
      - docker push europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-e2e:$DRONE_COMMIT_SHA
      - docker push europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-e2e:latest

# ══════════════════════════════════════════════════════════════════════════════
# PIPELINE: DEPLOY PREVIEW (K8s Runner, type: kubernetes)
# ══════════════════════════════════════════════════════════════════════════════
---
kind: pipeline
type: kubernetes
name: deploy-preview

trigger:
  event: [pull_request]

depends_on: [build-images]

steps:
  - name: deploy
    image: bitnami/kubectl:latest
    commands:
      - export NS="hostai-pr-$DRONE_PULL_REQUEST"
      - echo "Waiting for namespace $NS to be fully deleted (if exists)..."
      - for i in $(seq 1 30); do kubectl get namespace $NS 2>&1 | grep -q "not found" && break; echo "  Waiting ($i/30)..."; sleep 2; done
      - kubectl delete namespace $NS --ignore-not-found=true 2>/dev/null; sleep 2
      - sed -e "s|\$${PR_NUMBER}|$DRONE_PULL_REQUEST|g"
            -e "s|\$${COMMIT_SHA}|$DRONE_COMMIT_SHA|g"
            ci/k8s/preview.yaml | kubectl apply -f -
      - kubectl get secret ar-pull-secret -n drone -o yaml
          | grep -v '^\s*namespace:'
          | grep -v 'resourceVersion:'
          | grep -v 'uid:'
          | grep -v 'creationTimestamp:'
          | kubectl apply -n $NS -f -
      - kubectl rollout status deployment/hostai-api -n $NS --timeout=90s

  - name: wait-for-health
    image: curlimages/curl:8.5.0
    commands:
      - export URL="http://hostai-api-svc.hostai-pr-$DRONE_PULL_REQUEST.svc.cluster.local:8000/health"
      - echo "Waiting for $URL ..."
      - for i in $(seq 1 20); do
          curl -sf "$URL" > /dev/null 2>&1 && echo "Health OK!" && exit 0;
          echo "Attempt $i/20 - waiting 3s...";
          sleep 3;
        done
      - echo "Health check FAILED after 60s"
      - exit 1
    depends_on: [deploy]

# ══════════════════════════════════════════════════════════════════════════════
# PIPELINES: 11 TESTS E2E EN PARALELO (K8s Runner, 1 pod cada uno)
# ══════════════════════════════════════════════════════════════════════════════

---
kind: pipeline
type: kubernetes
name: test-api-health
trigger: { event: [pull_request] }
depends_on: [deploy-preview]
image_pull_secrets: [ar-pull-secret]
node_selector: {}
steps:
  - name: run
    image: europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-e2e:${DRONE_COMMIT_SHA}
    environment:
      CI: "true"
      API_URL: http://hostai-api-svc.hostai-pr-${DRONE_PULL_REQUEST}.svc.cluster.local:8000
      BASE_URL: http://hostai-api-svc.hostai-pr-${DRONE_PULL_REQUEST}.svc.cluster.local:8000
    commands:
      - cd /e2e && npx playwright test tests/api/health.spec.ts --project=chromium --reporter=list

