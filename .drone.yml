# ══════════════════════════════════════════════════════════════════════════════
# PIPELINE: REPORT + CLEANUP (siempre corre al final)
# ══════════════════════════════════════════════════════════════════════════════
---
kind: pipeline
type: kubernetes
name: report-and-cleanup

trigger:
  event: [pull_request]

depends_on:
  - test-api-health
  - test-api-auth
  - test-api-reservations
  - test-api-floor-plan
  - test-api-config
  - test-api-security
  - test-api-agent
  - test-ui-dashboard
  - test-ui-chat
  - test-ui-floor-plan
  - test-ui-rbac

steps:
  - name: report-datadog
    image: curlimages/curl:8.5.0
    environment:
      DD_API_KEY:
        from_secret: dd_api_key
    commands:
      - export TS=$(date +%s)
      - 'curl -s -X POST "https://api.datadoghq.eu/api/v1/events"
          -H "DD-API-KEY: $DD_API_KEY"
          -H "Content-Type: application/json"
          -d "{\"title\":\"HOST-AI PR #$DRONE_PULL_REQUEST tests completed\",
               \"text\":\"Branch: $DRONE_BRANCH. Commit: $DRONE_COMMIT_SHA. Status: $DRONE_BUILD_STATUS\",
               \"priority\":\"normal\",
               \"tags\":[\"pipeline:ai-host-agent\",\"pr:$DRONE_PULL_REQUEST\",
                         \"branch:$DRONE_BRANCH\",\"env:ci\",\"source:drone-ci\"],
               \"alert_type\":\"info\",
               \"source_type_name\":\"DRONE\"}"'
      - echo "Event sent to Datadog"

  - name: cleanup-preview
    image: bitnami/kubectl:1.29
    commands:
      - export NS="hostai-pr-$DRONE_PULL_REQUEST"
      - echo "Cleaning up namespace $NS..."
      - kubectl delete namespace $NS --ignore-not-found=true
      - echo "Cleanup complete"
    depends_on: [report-datadog]

# ══════════════════════════════════════════════════════════════════════════════
# PIPELINE: BUILD PRODUCTION (push a main, Docker Runner)
# ══════════════════════════════════════════════════════════════════════════════
---
kind: pipeline
type: docker
name: build-production

trigger:
  branch: [main]
  event: [push]

steps:
  - name: build-and-push
    image: plugins/gcr
    settings:
      repo: europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api
      registry: europe-west3-docker.pkg.dev
      dockerfile: Dockerfile
      tags:
        - "${DRONE_COMMIT_SHA}"
        - latest
      json_key:
        from_secret: gcr_json_key

# ══════════════════════════════════════════════════════════════════════════════
# PIPELINE: DEPLOY PRODUCTION (push a main, K8s Runner)
# ══════════════════════════════════════════════════════════════════════════════
---
kind: pipeline
type: kubernetes
name: deploy-production

trigger:
  branch: [main]
  event: [push]

depends_on: [build-production]

steps:
  - name: deploy
    image: bitnami/kubectl:1.29
    commands:
      - echo "Deploying to production..."
      - kubectl set image deployment/hostai-api
          api=europe-west3-docker.pkg.dev/nico-drone-ci-poc-2026/hostai/hostai-api:$DRONE_COMMIT_SHA
          -n hostai-prod
      - kubectl rollout status deployment/hostai-api -n hostai-prod --timeout=120s
      - echo "Production deploy complete"

  - name: report-datadog
    image: curlimages/curl:8.5.0
    environment:
      DD_API_KEY:
        from_secret: dd_api_key
    commands:
      - 'curl -s -X POST "https://api.datadoghq.eu/api/v1/events"
          -H "DD-API-KEY: $DD_API_KEY"
          -H "Content-Type: application/json"
          -d "{\"title\":\"HOST-AI production deployed\",
               \"text\":\"Commit: $DRONE_COMMIT_SHA. Branch: main.\",
               \"tags\":[\"pipeline:ai-host-agent\",\"env:production\",\"source:drone-ci\"],
               \"alert_type\":\"success\"}"'
    depends_on: [deploy]
