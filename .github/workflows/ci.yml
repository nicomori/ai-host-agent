# ─── Step 14 — CI/CD: Continuous Integration ──────────────────────────────────
# ai-host-agent CI pipeline
#
# Jobs:
#   lint        → ruff check (code style + import order)
#   test        → pytest with coverage (Python 3.11)
#   docker-build → docker build --target runtime (smoke-test image)
#
# Secrets required (configure in repo Settings → Secrets):
#   None for CI — all builds are local. See cd.yml for push secrets.

name: CI

on:
  push:
    branches: [main, master, "step/**"]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.11"
  PROJECT: ai-host-agent

jobs:
  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Install dev dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run ruff linter
        run: ruff check src/ tests/

      - name: Run ruff formatter check
        run: ruff format --check src/ tests/

  # ── Job 2: Test ──────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    env:
      # Minimal env overrides — real secrets not needed for unit tests
      API_KEY: ci-test-key
      APP_ENV: test
      LANCEDB_URI: /tmp/ci_lancedb
      ANTHROPIC_API_KEY: dummy-anthropic-key
      OPENAI_API_KEY: dummy-openai-key
      ELEVENLABS_API_KEY: dummy-elevenlabs-key
      TWILIO_ACCOUNT_SID: ACdummy0000000000000000000000000
      TWILIO_AUTH_TOKEN: dummy-twilio-token
      TWILIO_FROM_NUMBER: "+15005550006"
      RESTAURANT_NAME: "CI Restaurant"
      DATABASE_URL: sqlite:///./ci_test.db
      REDIS_URL: redis://localhost:6379/0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Install dev dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --ignore=tests/unit/test_observability.py \
            --ignore=tests/unit/test_checkpointing.py \
            --ignore=tests/unit/test_api.py \
            --ignore=tests/unit/test_step13_api.py \
            --ignore=tests/unit/test_db_persistence.py \
            --ignore=tests/unit/test_infra.py \
            --ignore=tests/unit/test_step14_cicd.py \
            --ignore=tests/unit/test_step15_demo.py \
            -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Job 3: Docker build ───────────────────────────────────────────────────────
  # Note: Full Docker builds run in Drone CI (GKE) which has GCP registry access.
  # GitHub Actions only validates the Dockerfile syntax.
  docker-build:
    name: Docker build (smoke test)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Dockerfile syntax
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error
