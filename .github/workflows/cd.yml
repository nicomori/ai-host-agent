# ─── Step 14 — CI/CD: Continuous Delivery ─────────────────────────────────────
# ai-host-agent CD pipeline
#
# Triggers:
#   push to main       → build + push :latest image
#   tag push v*.*.*    → build + push :vX.Y.Z + :latest image
#
# Secrets required (configure in repo Settings → Secrets):
#   REGISTRY_USERNAME  → ghcr.io / Docker Hub username
#   REGISTRY_PASSWORD  → ghcr.io PAT or Docker Hub token
#   DEPLOY_SSH_HOST    → SSH host for deployment (optional)
#   DEPLOY_SSH_KEY     → SSH private key for deployment (optional)
#
# Registry: ghcr.io (GitHub Container Registry) — change IMAGE_REPO as needed

name: CD

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

env:
  PYTHON_VERSION: "3.11"
  PROJECT: ai-host-agent
  IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/ai-host-agent

jobs:
  # ── Job 1: Build + Push Docker image ─────────────────────────────────────────
  build-and-push:
    name: Build & Push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REPO }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy (optional SSH deploy step) ─────────────────────────────────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Deploy via SSH
        if: ${{ secrets.DEPLOY_SSH_HOST != '' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: deploy
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/ai-host-agent
            docker compose pull api
            docker compose up -d --no-deps api
            docker system prune -f
