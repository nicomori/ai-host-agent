apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: hostai-prod
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      nodeSelector:
        pool: apps
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "hostai_prod"
            - name: POSTGRES_USER
              value: "hostai_prod"
            - name: POSTGRES_PASSWORD
              value: "hostai-prod-pass-2026"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "hostai_prod"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: hostai-prod
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
